name: codex-skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry:
    name: registry doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: doctor
        uses: wangjiehu/codex-skills-registry@dbab3b515c73dd028f5b35bcc22547077601d7a6 # v1.0.3
        continue-on-error: true
        with:
          path: .
          command: doctor
          format: sarif
          policy: .codex-skills-registry.yaml
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: >-
          always() &&
          steps.doctor.outputs.sarif-path != '' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: ${{ steps.doctor.outputs.sarif-path }}
      - uses: wangjiehu/codex-skills-registry@dbab3b515c73dd028f5b35bcc22547077601d7a6 # v1.0.3
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          path: .
          command: pr-comment
          policy: .codex-skills-registry.yaml
          post-comment: "true"
      - if: steps.doctor.outcome == 'failure'
        run: exit 1

  site:
    name: registry site artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: wangjiehu/codex-skills-registry@dbab3b515c73dd028f5b35bcc22547077601d7a6 # v1.0.3
        with:
          path: .
          command: site
          policy: .codex-skills-registry.yaml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-skills-registry-site
          path: codex-skills-registry-site
