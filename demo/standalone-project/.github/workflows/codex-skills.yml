name: codex-skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry:
    name: registry doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: doctor
        uses: wangjiehu/codex-skills-registry@83fd4ff97aa1e608783adeee38c6f982768a4424 # v0.6.3
        continue-on-error: true
        with:
          path: .
          command: doctor
          format: sarif
          policy: .codex-skills-registry.yaml
      - uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        if: >-
          always() &&
          steps.doctor.outputs.sarif-path != '' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: ${{ steps.doctor.outputs.sarif-path }}
      - uses: wangjiehu/codex-skills-registry@83fd4ff97aa1e608783adeee38c6f982768a4424 # v0.6.3
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          path: .
          command: pr-comment
          policy: .codex-skills-registry.yaml
          post-comment: "true"
      - if: steps.doctor.outcome == 'failure'
        run: exit 1

  site:
    name: registry site artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: wangjiehu/codex-skills-registry@83fd4ff97aa1e608783adeee38c6f982768a4424 # v0.6.3
        with:
          path: .
          command: site
          policy: .codex-skills-registry.yaml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codex-skills-registry-site
          path: codex-skills-registry-site
