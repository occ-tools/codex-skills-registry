name: codex-skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry:
    name: registry doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: doctor
        uses: occ-tools/codex-skills-registry@e68aba5aead57f18b51ddb1b0b47294ef6eea8e7 # v1.0.4
        continue-on-error: true
        with:
          path: .
          command: doctor
          format: sarif
          policy: .codex-skills-registry.yaml
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: >-
          always() &&
          steps.doctor.outputs.sarif-path != '' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
        with:
          sarif_file: ${{ steps.doctor.outputs.sarif-path }}
      - uses: occ-tools/codex-skills-registry@e68aba5aead57f18b51ddb1b0b47294ef6eea8e7 # v1.0.4
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          path: .
          command: pr-comment
          policy: .codex-skills-registry.yaml
          post-comment: "true"
      - if: steps.doctor.outcome == 'failure'
        run: exit 1

  site:
    name: registry site artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: occ-tools/codex-skills-registry@e68aba5aead57f18b51ddb1b0b47294ef6eea8e7 # v1.0.4
        with:
          path: .
          command: site
          policy: .codex-skills-registry.yaml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-skills-registry-site
          path: codex-skills-registry-site
