name: Codex Skills Registry
description: Validate Codex Skills, plugin manifests, and MCP server configs in CI.

branding:
  icon: shield
  color: green

inputs:
  path:
    description: Project directory to inspect.
    required: false
    default: .
  command:
    description: CLI command to run. Supported values are doctor, validate, list, audit, export, report, schema, pr-comment, baseline, and site.
    required: false
    default: doctor
  include-examples:
    description: Include examples/ skill roots under the target project directory.
    required: false
    default: "false"
  config:
    description: Optional JSON/YAML skill config path, relative to path.
    required: false
    default: ""
  policy:
    description: Optional registry policy file path, relative to path.
    required: false
    default: ""
  changed-files:
    description: Optional newline-delimited changed file list, relative to path, for PR-focused output.
    required: false
    default: ""
  baseline:
    description: Optional issue baseline JSON file, relative to path. Overrides policy baselineFile.
    required: false
    default: ""
  format:
    description: CLI output format. Supported values are text, json, and sarif.
    required: false
    default: text
  strict:
    description: Enable strict audit behavior for doctor or audit.
    required: false
    default: "false"
  schema:
    description: Optional schema name when command is schema. Omit to export the full catalog.
    required: false
    default: ""
  post-comment:
    description: When command is pr-comment, create or update a pull request comment using github.token. Requires pull-requests: write on the caller workflow.
    required: false
    default: "false"
  comment-marker:
    description: Hidden marker used to update an existing pull request comment.
    required: false
    default: "<!-- codex-skills-registry -->"

outputs:
  index-path:
    description: Path to the exported registry index when command is export.
    value: ${{ steps.run.outputs.index-path }}
  sarif-path:
    description: Path to the SARIF file when format is sarif.
    value: ${{ steps.run.outputs.sarif-path }}
  schema-path:
    description: Path to the exported JSON Schema catalog when command is schema.
    value: ${{ steps.run.outputs.schema-path }}
  report-path:
    description: Path to the exported Markdown report when command is report.
    value: ${{ steps.run.outputs.report-path }}
  comment-path:
    description: Path to the generated pull request comment when command is pr-comment.
    value: ${{ steps.run.outputs.comment-path }}
  baseline-path:
    description: Path to the generated baseline file when command is baseline.
    value: ${{ steps.run.outputs.baseline-path }}
  site-path:
    description: Path to the generated static site when command is site.
    value: ${{ steps.run.outputs.site-path }}
  issue-count:
    description: Active issue count from JSON summary output.
    value: ${{ steps.run.outputs.issue-count }}
  error-count:
    description: Active error count from JSON summary output.
    value: ${{ steps.run.outputs.error-count }}
  warning-count:
    description: Active warning count from JSON summary output.
    value: ${{ steps.run.outputs.warning-count }}
  suppressed-count:
    description: Suppressed issue count from JSON summary output.
    value: ${{ steps.run.outputs.suppressed-count }}
  baseline-count:
    description: Baseline-filtered issue count from JSON summary output.
    value: ${{ steps.run.outputs.baseline-count }}

runs:
  using: composite
  steps:
    - name: Install action dependencies
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        if [[ -f dist/cli.js ]]; then
          npm ci --omit=dev --ignore-scripts
        else
          npm ci --ignore-scripts
          npm run build
        fi

    - name: Run codex-skills
      id: run
      shell: bash
      env:
        REGISTRY_INPUT_PATH: ${{ inputs.path }}
        REGISTRY_INPUT_COMMAND: ${{ inputs.command }}
        REGISTRY_INPUT_INCLUDE_EXAMPLES: ${{ inputs.include-examples }}
        REGISTRY_INPUT_CONFIG: ${{ inputs.config }}
        REGISTRY_INPUT_POLICY: ${{ inputs.policy }}
        REGISTRY_INPUT_CHANGED_FILES: ${{ inputs.changed-files }}
        REGISTRY_INPUT_BASELINE: ${{ inputs.baseline }}
        REGISTRY_INPUT_FORMAT: ${{ inputs.format }}
        REGISTRY_INPUT_STRICT: ${{ inputs.strict }}
        REGISTRY_INPUT_SCHEMA: ${{ inputs.schema }}
        REGISTRY_INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        REGISTRY_INPUT_COMMENT_MARKER: ${{ inputs.comment-marker }}
        GITHUB_TOKEN: ${{ github.token }}
        REGISTRY_GITHUB_REPOSITORY: ${{ github.repository }}
        REGISTRY_GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"

        target_path="$REGISTRY_INPUT_PATH"
        if [[ "$target_path" != /* ]]; then
          target_path="$GITHUB_WORKSPACE/$target_path"
        fi

        base_args=(--cwd "$target_path")
        if [[ "$REGISTRY_INPUT_INCLUDE_EXAMPLES" != "true" ]]; then
          base_args+=(--no-examples)
        fi
        if [[ -n "$REGISTRY_INPUT_CONFIG" ]]; then
          base_args+=(--config "$REGISTRY_INPUT_CONFIG")
        fi
        if [[ -n "$REGISTRY_INPUT_POLICY" ]]; then
          base_args+=(--policy "$REGISTRY_INPUT_POLICY")
        fi
        if [[ -n "$REGISTRY_INPUT_CHANGED_FILES" ]]; then
          base_args+=(--changed-files "$REGISTRY_INPUT_CHANGED_FILES")
        fi
        if [[ -n "$REGISTRY_INPUT_BASELINE" ]]; then
          base_args+=(--baseline "$REGISTRY_INPUT_BASELINE")
        fi
        args=("${base_args[@]}" --format "$REGISTRY_INPUT_FORMAT" --github-annotations)
        summary_args=("${base_args[@]}" --format json)

        strict_args=()
        if [[ "$REGISTRY_INPUT_STRICT" == "true" ]]; then
          strict_args+=(--strict)
        fi
        sarif_file="$target_path/codex-skills-registry.sarif"
        write_issue_outputs() {
          local subcommand="$1"
          shift
          local summary_file="$target_path/codex-skills-registry-summary.json"
          set +e
          node dist/cli.js "${summary_args[@]}" "$subcommand" "$@" > "$summary_file"
          local summary_status=$?
          set -e
          if [[ "$summary_status" -gt 1 || ! -s "$summary_file" ]]; then
            return 0
          fi

          SUMMARY_FILE="$summary_file" node <<'NODE'
        const fs = require("node:fs");
        const data = JSON.parse(fs.readFileSync(process.env.SUMMARY_FILE, "utf8"));
        const arrays = [
          data.diagnostics,
          data.validationIssues,
          data.auditIssues,
          data.issues,
          Array.isArray(data.results) ? data.results.flatMap((result) => result.issues ?? []) : []
        ].filter(Array.isArray);
        const issues = arrays.flat();
        const suppressed = data.suppressedIssues ?? [];
        const baseline = data.baselineIssues ?? [];
        const errors = issues.filter((issue) => issue.severity === "error").length;
        const warnings = issues.filter((issue) => issue.severity === "warning").length;
        fs.appendFileSync(process.env.GITHUB_OUTPUT, [
          `issue-count=${issues.length}`,
          `error-count=${errors}`,
          `warning-count=${warnings}`,
          `suppressed-count=${suppressed.length}`,
          `baseline-count=${baseline.length}`
        ].join("\n") + "\n");
        NODE
        }

        run_sarif_or_text() {
          local subcommand="$1"
          shift
          if [[ "$REGISTRY_INPUT_FORMAT" == "sarif" ]]; then
            set +e
            node dist/cli.js "${args[@]}" "$subcommand" "$@" > "$sarif_file"
            local status=$?
            set -e
            echo "sarif-path=$sarif_file" >> "$GITHUB_OUTPUT"
            write_issue_outputs "$subcommand" "$@"
            exit "$status"
          fi

          set +e
          node dist/cli.js "${args[@]}" "$subcommand" "$@"
          local status=$?
          set -e
          write_issue_outputs "$subcommand" "$@"
          exit "$status"
        }

        case "$REGISTRY_INPUT_COMMAND" in
          doctor)
            run_sarif_or_text doctor "${strict_args[@]}"
            ;;
          validate)
            run_sarif_or_text validate
            ;;
          list)
            node dist/cli.js "${args[@]}" list
            ;;
          audit)
            run_sarif_or_text audit "${strict_args[@]}"
            ;;
          export)
            out_file="$target_path/codex-skills-registry-index.json"
            node dist/cli.js "${args[@]}" export --out codex-skills-registry-index.json
            echo "index-path=$out_file" >> "$GITHUB_OUTPUT"
            ;;
          report)
            out_file="$target_path/codex-skills-registry-report.md"
            node dist/cli.js "${args[@]}" report --out codex-skills-registry-report.md
            echo "report-path=$out_file" >> "$GITHUB_OUTPUT"
            ;;
          pr-comment)
            out_file="$target_path/codex-skills-registry-pr-comment.md"
            comment_args=(--out codex-skills-registry-pr-comment.md --report-path codex-skills-registry-report.md --sarif-path codex-skills-registry.sarif --comment-marker "$REGISTRY_INPUT_COMMENT_MARKER")
            if [[ "$REGISTRY_INPUT_POST_COMMENT" == "true" ]]; then
              comment_args+=(--post)
            fi
            node dist/cli.js "${args[@]}" pr-comment "${comment_args[@]}"
            echo "comment-path=$out_file" >> "$GITHUB_OUTPUT"
            write_issue_outputs doctor "${strict_args[@]}"
            ;;
          baseline)
            out_file="$target_path/codex-skills-baseline.json"
            node dist/cli.js "${base_args[@]}" baseline --out codex-skills-baseline.json "${strict_args[@]}"
            echo "baseline-path=$out_file" >> "$GITHUB_OUTPUT"
            ;;
          schema)
            out_file="$target_path/codex-skills-registry.schema.json"
            schema_args=()
            if [[ -n "$REGISTRY_INPUT_SCHEMA" ]]; then
              schema_args+=("$REGISTRY_INPUT_SCHEMA")
            fi
            node dist/cli.js "${args[@]}" schema "${schema_args[@]}" --out codex-skills-registry.schema.json
            echo "schema-path=$out_file" >> "$GITHUB_OUTPUT"
            ;;
          site)
            out_dir="$target_path/codex-skills-registry-site"
            node dist/cli.js "${args[@]}" site --out codex-skills-registry-site
            echo "site-path=$out_dir" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unsupported command: $REGISTRY_INPUT_COMMAND" >&2
            exit 2
            ;;
        esac
