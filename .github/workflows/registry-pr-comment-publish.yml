name: registry-pr-comment

on:
  workflow_run:
    workflows: [registry-pr-analysis]
    types: [completed]

permissions: read-all

jobs:
  comment:
    name: publish registry summary
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout trusted publisher
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: action
          persist-credentials: false
      - name: Download registry summary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: registry-pr-comment-${{ github.event.workflow_run.pull_requests[0].number }}
          path: result
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Publish sanitized registry summary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REGISTRY_GITHUB_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: >-
          node action/dist/publish-comment-file.js
          result/codex-skills-registry-pr-comment.md
