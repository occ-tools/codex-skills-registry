name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: node-${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: node dist/cli.js list
      - run: node dist/cli.js doctor
      - run: node dist/cli.js --format sarif doctor
      - run: node dist/cli.js schema policy
      - run: npm run pack:check

  action-smoke:
    name: reusable action smoke test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Smoke reusable action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: doctor
      - name: Smoke schema export action
        uses: ./
        with:
          path: .
          command: schema
          schema: policy
      - name: Smoke report action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: report
      - name: Smoke PR comment action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: pr-comment
      - name: Smoke baseline action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: baseline
      - name: Smoke site action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: site
      - name: Smoke escaped policy input is rejected
        id: escaped-policy
        uses: ./
        continue-on-error: true
        with:
          path: .
          command: doctor
          policy: ../outside-policy.yaml
      - name: Verify escaped policy input failed
        if: steps.escaped-policy.outcome != 'failure'
        run: |
          echo "Escaped policy input unexpectedly succeeded." >&2
          exit 1
