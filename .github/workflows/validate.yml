name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: node-${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: node dist/cli.js list
      - run: node dist/cli.js doctor
      - run: node dist/cli.js --format sarif doctor
      - run: node dist/cli.js schema policy
      - run: npm run pack:check

  action-smoke:
    name: reusable action smoke test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Smoke reusable action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: doctor
      - name: Smoke schema export action
        uses: ./
        with:
          path: .
          command: schema
          schema: policy
      - name: Smoke report action
        uses: ./
        with:
          path: .
          include-examples: "true"
          command: report
