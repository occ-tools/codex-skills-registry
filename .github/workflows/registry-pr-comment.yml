name: registry-pr-comment

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    name: publish registry summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./
        with:
          path: .
          include-examples: "true"
          command: pr-comment
          post-comment: "true"
