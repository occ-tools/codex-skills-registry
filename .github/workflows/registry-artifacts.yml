name: registry-artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: export registry artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: node dist/cli.js export --out codex-skills-registry-index.json
      - run: node dist/cli.js report --out codex-skills-registry-report.md
      - run: node dist/cli.js schema --out codex-skills-registry.schema.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-skills-registry-artifacts
          path: |
            codex-skills-registry-index.json
            codex-skills-registry-report.md
            codex-skills-registry.schema.json
