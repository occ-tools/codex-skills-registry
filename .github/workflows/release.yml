name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  npm:
    name: publish npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches package version
        shell: bash
        run: |
          expected="v${{ steps.package.outputs.version }}"
          actual="${GITHUB_REF_NAME}"
          if [[ "$actual" != "$expected" ]]; then
            echo "Release tag $actual does not match package version $expected." >&2
            exit 1
          fi
      - run: npm run market:check
      - id: published
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - id: pack
        if: steps.published.outputs.exists != 'true'
        shell: bash
        run: |
          npm pack --json > npm-pack.json
          tarball="$(node dist/npm-pack-output.js npm-pack.json)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - name: Attest npm tarball provenance
        if: steps.published.outputs.exists != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
      - name: Publish npm package
        if: steps.published.outputs.exists != 'true'
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set +e
          publish_output="$(npm publish "$TARBALL" --access public 2>&1)"
          publish_status=$?
          set -e

          printf '%s\n' "$publish_output"
          if [[ "$publish_status" -eq 0 ]]; then
            exit 0
          fi

          if grep -qE 'E404|Not Found - PUT|not have permission' <<< "$publish_output"; then
            {
              echo "### npm publish permission check failed"
              echo ""
              echo "Package: \`$PACKAGE_NAME@$PACKAGE_VERSION\`"
              echo ""
              echo "npm returned a not-found or permission error while publishing. For Trusted Publishing, verify the npm package publisher is configured for this GitHub repository and workflow:"
              echo ""
              echo "- GitHub organization/user: \`Hephaestus-DevKit\`"
              echo "- GitHub repository: \`codex-skills-registry\`"
              echo "- Workflow filename: \`release.yml\`"
              echo "- Package name: \`$PACKAGE_NAME\`"
              echo ""
              echo "After fixing the npm package settings, rerun the failed workflow; no source change is required."
            } >> "$GITHUB_STEP_SUMMARY"

            {
              echo "npm publish could not publish $PACKAGE_NAME@$PACKAGE_VERSION."
              echo "Check the npm Trusted Publisher configuration for Hephaestus-DevKit/codex-skills-registry and .github/workflows/release.yml, then rerun this workflow."
            } >&2
          fi

          exit "$publish_status"
      - name: Report existing npm version
        if: steps.published.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping npm publish."
